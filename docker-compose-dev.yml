version: "3"
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - 3000:5173
    volumes:
      - /app/node_modules
      - .:/app
  tests:
    build:
      context: .
      dockerfile: Dockerfile.dev
    tty: true
    volumes:
      - /app/node_modules
      - .:/app
    command: ["npm", "run", "tests-with-watch"]
