name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Docker image
        run: docker build -t giacoder/docker-react -f Dockerfile.dev .
      - name: Run tests
        run: docker run -e CI=true giacoder/docker-react npm run tests-with-watch
